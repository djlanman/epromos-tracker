<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&amp;display=swap');
    </style>
  </defs>
  <!-- Globe mark: two overlapping circles forming the "e" -->
  <g transform="translate(10, 8)">
    <!-- Main outer circle -->
    <circle cx="42" cy="42" r="38" stroke="#1B3C21" stroke-width="6.5" fill="none"/>
    <!-- Inner offset circle (creates the overlapping globe/e effect) -->
    <circle cx="32" cy="42" r="24" stroke="#1B3C21" stroke-width="5" fill="none"/>
    <!-- Lower arc connecting the two circles -->
    <path d="M 14 58 Q 42 78 70 58" stroke="#1B3C21" stroke-width="5" fill="none"/>
  </g>
  <!-- Text: ePROMOS -->
  <text x="105" y="74" font-family="'Inter', 'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="72" fill="#1B3C21" letter-spacing="3">
    <tspan font-style="italic">e</tspan>PROMOS
  </text>
</svg>
